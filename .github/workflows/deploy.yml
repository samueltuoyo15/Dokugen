name: Deploy Dokugen Server

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert repository names to lowercase
        run: |
          echo "IMAGE_NAME=$(echo "ghcr.io/${{ github.repository_owner }}/dokugen-server" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Zeabur Redeploy via GraphQL API
        env:
          ZEABUR_API_TOKEN: ${{ secrets.ZEABUR_API_TOKEN }}
          SERVICE_ID: ${{ secrets.ZEABUR_SERVICE_ID }}
          ENVIRONMENT_ID: ${{ secrets.ZEABUR_ENVIRONMENT_ID }}
        if: env.ZEABUR_API_TOKEN != '' && env.SERVICE_ID != '' && env.ENVIRONMENT_ID != ''
        run: |
          curl --request POST \
            --url https://api.zeabur.com/graphql \
            --header "Authorization: Bearer ${{ secrets.ZEABUR_API_TOKEN }}" \
            --header "Content-Type: application/json" \
            --data "{\"query\":\"mutation { restartService(serviceID: \\\"${{ secrets.ZEABUR_SERVICE_ID }}\\\", environmentID: \\\"${{ secrets.ZEABUR_ENVIRONMENT_ID }}\\\") }\"}"
